name: Build and Publish SQLsense VSIX

on:
  push:
    tags:
      - 'v*' # Trigger on tags starting with 'v', e.g., v1.0.0

jobs:
  build:
    runs-on: windows-latest

    env:
      Solution_Name: SQLsense.sln
      Project_Path: SQLsense\SQLsense.csproj

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet Packages
      run: nuget restore ${{ env.Solution_Name }}

    - name: Build the VSIX Package (Release)
      # Building the .csproj directly ensures the VSIX targets run and generate the .vsix in bin\Release
      run: msbuild ${{ env.Project_Path }} /p:Configuration=Release /t:Rebuild /p:DeployExtension=false /p:ZipPackageCompressionLevel=Normal /v:m

    - name: Find VSIX File
      id: find_vsix
      run: |
        $vsixPath = Get-ChildItem -Path SQLsense\bin\Release\ -Filter *.vsix | Select-Object -First 1
        echo "vsix_file=$($vsixPath.FullName)" >> $env:GITHUB_OUTPUT
        echo "vsix_name=$($vsixPath.Name)" >> $env:GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ steps.find_vsix.outputs.vsix_file }}
        name: SQLsense ${{ github.ref_name }}
        draft: false
        prerelease: false
        generate_release_notes: true
